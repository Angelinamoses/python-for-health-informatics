name: Validate Notebooks

on: [push, pull_request]

jobs:
validate:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v4
    with:
      python-version: "3.10"

  - name: Install dependencies
    run: pip install -r requirements.txt nbconvert

  - name: Validate notebooks run without errors
    run: |
      notebooks=(
        "n1_python_fundamentals.ipynb"
        "n2_control_flow.ipynb"
        "n3_data_structures.ipynb"
        "n4_functions.ipynb"
        "n6_file_handling.ipynb"
        "n7_oop.ipynb"
      )

      for nb in "${notebooks[@]}"; do
        echo "Validating $nb"
        jupyter nbconvert --to notebook --execute "$nb" --output /tmp/test.ipynb
      done
```
